---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "chore:"
    open-pull-requests-limit: 8
    rebase-strategy: disabled
    schedule:
      interval: "monthly"
      day: "monday"
      time: "08:00"
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
