{{- if and .Values.backupCheck.enabled .Values.autoscaling.enabled (.Capabilities.APIVersions.Has "autoscaling.k8s.io/v1") }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "postgresql-single.fullname" . }}-backup-check
  labels:
    {{- include "postgresql-single.labels" . | nindent 4 }}
    app.kubernetes.io/component: checker
spec:
  targetRef:
    apiVersion: batch/v1
    kind: CronJob
    name: {{ include "postgresql-single.fullname" . }}-backup-check
  updatePolicy:
    updateMode: {{ .Values.autoscaling.updatePolicy.updateMode }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ .Chart.Name }}-backup-check
        {{- with merge (deepCopy .Values.autoscaling.maxAllowed) .Values.backupCheck.resources.limits }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with merge (deepCopy .Values.autoscaling.minAllowed) .Values.backupCheck.resources.requests }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.autoscaling.controlledResources }}
        controlledResources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.autoscaling.controlledValues }}
        controlledValues: {{ . }}
        {{- end }}
{{- end }}
