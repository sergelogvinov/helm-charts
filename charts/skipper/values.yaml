# Default values for skipper.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/zalando/skipper
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Environment variables
env: []

# -- Skipper arguments
args: []
  # - -enable-proxy-protocol
  # - -proxy-allow-cidrs="::0/0,0.0.0.0/0"

# -- Skipper config file body
# refs: https://opensource.zalando.com/skipper/tutorials/basics/#yaml-configuration
config:
  default-filters-prepend: enableAccessLog(2,4,5)->flowId()->xforward()

  # enable-kubernetes-external-names: true
  # kubernetes-only-allowed-external-names: true
  # kubernetes-allowed-external-names:
  #   - ^one[.]example[.]org$
  #   - ^two[.]example[.]org$

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations for pod.
# ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
  # cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

# -- Extra labels for pod.
# ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -- Pod Security Context.
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 9999
  runAsGroup: 9999
  fsGroup: 9999
  fsGroupChangePolicy: "OnRootMismatch"

# -- Container Security Context.
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
securityContext:
  seccompProfile:
    type: RuntimeDefault
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Pod host network
# Use it only for performance reason
hostNetwork: false

# -- Service node port
# refs: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
hostPort:
  enabled: false
  ports:
    http: 8080
    https: 8443

ingressClass: skipper
ingressClassResource:
  enabled: false
  controllerValue: "k8s.io/ingress-skipper"

service:
  type: ClusterIP

  annotations: {}
  # service.kubernetes.io/topology-mode: Auto

  ipFamilies: [IPv4]

resources:
  limits:
    cpu: 1
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Horizontal and Vertical pod autoscaler.
# ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
autoscaling:
  enabled: false

  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

  # -- Resource to control
  # Possible values are "cpu" and "memory"
  controlledResources: ["cpu", "memory"]

  # -- Controls which resource value should be autoscaled
  # Possible values are "RequestsAndLimits" and "RequestsOnly"
  controlledValues: RequestsOnly

  # -- Max allowed resources for the pod
  # default is resources.limits
  maxAllowed: {}
    # cpu: 1
    # memory: 500Mi

  # -- Min allowed resources for the pod
  # default is resources.requests
  minAllowed: {}
    # cpu: 1
    # memory: 500Mi

  # -- Update policy
  # Possible values are "Off", "Initial", "Recreate", "InPlaceOrRecreate" and "Auto"
  updatePolicy:
    updateMode: InPlaceOrRecreate

# -- Use a daemonset instead of a deployment
useDaemonSet: false

terminationGracePeriodSeconds: 120

## updateStrategy for PostgreSQL StatefulSet and its slaves StatefulSets
## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# -- Priority Class Name
# ref: https://kubernetes.io/docs/concepts/configuration/pod-priority-preemption/#priorityclass
priorityClassName: ~

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- Node labels for pod assignment.
# ref: https://kubernetes.io/docs/user-guide/node-selection/
nodeSelector: {}

# -- Tolerations for pod assignment.
# ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
tolerations: []

# -- Pod Anti Affinity
# soft/hard
podAntiAffinityPreset: soft

# -- Affinity for pod assignment.
# ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
affinity: {}

metrics:
  enabled: false
