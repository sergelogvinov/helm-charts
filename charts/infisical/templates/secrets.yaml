{{- if ne (len .Values.envSecrets) 0 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "infisical.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infisical.labels" . | nindent 4 }}
type: Opaque
data:
{{- range $name, $value := .Values.envSecrets }}
  {{ $name }}: {{ tpl $value $ | b64enc | quote }}
{{- end }}
{{- end }}
