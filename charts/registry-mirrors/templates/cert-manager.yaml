{{- if .Values.auth.tls }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "registry-mirrors.fullname" . }}-issuer
  labels:
    {{- include "registry-mirrors.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "registry-mirrors.fullname" . }}-ca
  labels:
    {{- include "registry-mirrors.labels" . | nindent 4 }}
spec:
  secretName: {{ include "registry-mirrors.fullname" . }}-ca
  secretTemplate:
    labels:
      {{- include "registry-mirrors.selectorLabels" . | nindent 6 }}
  commonName: {{ include "registry-mirrors.fullname" . }}
  duration: 87600h # 10y
  renewBefore: 2160h # 1m
  privateKey:
    algorithm: ECDSA
    encoding: PKCS1
    size: 256
  isCA: true
  issuerRef:
    name: {{ include "registry-mirrors.fullname" . }}-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "registry-mirrors.fullname" . }}-ca-issuer
  labels:
    {{- include "registry-mirrors.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ include "registry-mirrors.fullname" . }}-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "registry-mirrors.fullname" . }}-server
  labels:
    {{- include "registry-mirrors.labels" . | nindent 4 }}
spec:
  secretName: {{ include "registry-mirrors.fullname" . }}-auth-server
  secretTemplate:
    labels:
      {{- include "registry-mirrors.selectorLabels" . | nindent 6 }}
  duration: 26280h # 3y
  renewBefore: 8760h # 1y
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    encoding: PKCS1
    size: 256
  usages:
    - server auth
    - client auth
  isCA: false
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  issuerRef:
    name: {{ include "registry-mirrors.fullname" . }}-ca-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "registry-mirrors.fullname" . }}-containerd
  labels:
    {{- include "registry-mirrors.labels" . | nindent 4 }}
spec:
  secretName: {{ include "registry-mirrors.fullname" . }}-auth-containerd
  secretTemplate:
    labels:
      {{- include "registry-mirrors.selectorLabels" . | nindent 6 }}
  commonName: containerd
  duration: 26280h # 3y
  renewBefore: 4380h # 6m
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    encoding: PKCS1
    size: 256
  usages:
    - client auth
  isCA: false
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ printf "containerd.%s" .host | quote }}
    {{- end }}
  issuerRef:
    name: {{ include "registry-mirrors.fullname" . }}-ca-issuer
    kind: Issuer
{{- end }}
