- name: fluxcd-static.rules
  rules:
    - alert: FluxHelmReleaseFailure
      expr: gotk_resource_info{ready="False", customresource_kind="HelmRelease"} > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        description: The {{ $labels.name }} in namespace {{ $labels.namespace }} is marked as not ready.
        summary: Flux HelmRelease Failure
    - alert: FluxKustomizationFailure
      expr: gotk_resource_info{ready="False", customresource_kind="Kustomization"} > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        description: The {{ $labels.name }} in namespace {{ $labels.namespace }} is marked as not ready.
        summary: Flux Kustomization Failure
    - alert: FluxSourceIssue
      expr: gotk_resource_info{ready="False", customresource_kind=~"GitRepository|HelmRepository|Bucket|OCIRepository"} > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        description: Flux source {{ $labels.name }} has issue(s).
        summary: Flux Source Issue
