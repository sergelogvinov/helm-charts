fullnameOverride: vmcluster
priorityClassName: system-cluster-critical

vmstorage:
  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "8Gi"

  persistence:
    enabled: true
    annotations:
      resize.topolvm.io/increase: 5Gi
      resize.topolvm.io/storage_limit: 100Gi
      resize.topolvm.io/threshold: 15%
    accessModes:
      - ReadWriteOnce
    storageClass: proxmox
    size: 10Gi

vmselect:
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"
    requests:
      cpu: "500m"
      memory: "500Mi"

vminsert:
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"

  extraArgs:
    maxLabelsPerTimeseries: "50"
