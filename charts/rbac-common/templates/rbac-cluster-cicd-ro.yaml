{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if not .Values.rbac.singleNamespace }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ include "rbac-common.fullname" . }}:cicd:ro
  labels:
    {{- include "rbac-common.labels" . | nindent 4 }}
rules:
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - impersonate
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - endpoints
  - persistentvolumeclaims
  - persistentvolumeclaims/status
  - pods
  - pods/log
  - pods/status
  - pods/attach
  - pods/exec
  - pods/portforward
  - pods/proxy
  - serviceaccounts
  - services
  - services/status
  - services/proxy
  - bindings
  - events
  - limitranges
  - resourcequotas
  - resourcequotas/status
  - namespaces/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - controllerrevisions
  - daemonsets
  - daemonsets/status
  - deployments
  - deployments/scale
  - deployments/status
  - replicasets
  - replicasets/scale
  - replicasets/status
  - statefulsets
  - statefulsets/scale
  - statefulsets/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - cronjobs/status
  - jobs
  - jobs/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  - poddisruptionbudgets/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - ingresses/status
  - networkpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  {{- if not .Values.rbac.singleNamespace }}
  - nodes
  {{- end }}
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  - horizontalpodautoscalers/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.k8s.io
  resources:
  - verticalpodautoscalers
  verbs:
  - get
  - list
  - watch
#### Cert Manager
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  - certificaterequests
  - issuers
  - clusterissuers
  verbs:
  - get
  - list
  - watch
#### External Secrets
- apiGroups:
  - external-secrets.io
  resources:
  - secretstores
  - clustersecretstores
  - pushsecrets
  - clusterpushsecrets
  - externalsecrets
  verbs:
  - list
  - watch
#### Victoria Metrics
- apiGroups:
  - operator.victoriametrics.com
  resources:
  - vmalerts
  - vmalerts/status
  - vmprobes
  - vmprobes/status
  - vmrules
  - vmrules/status
  verbs:
  - get
  - list
  - watch
#### Percona Server for MongoDB
- apiGroups:
  - psmdb.percona.com
  resources:
  - perconaservermongodbs
  - perconaservermongodbbackups
  verbs:
  - get
  - list
  - watch
#### Cloudnative-PG
- apiGroups:
  - postgresql.cnpg.io
  resources:
  - clusters
  - clusters/status
  - poolers
  - poolers/status
  - databases
  - databases/status
  - backups
  - backups/status
  - scheduledbackups
  - scheduledbackups/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cnpg-extensions.yandex.cloud
  resources:
  - backupconfigs
  verbs:
  - get
  - list
  - watch
#### Clickhouse altinity
- apiGroups:
  - clickhouse.altinity.com
  resources:
  - clickhouseinstallations
  - clickhouseinstallationtemplates
  verbs:
  - get
  - list
  - watch
#### OpenSearch
- apiGroups:
  - opensearch.org
  resources:
  - opensearchclusters
  verbs:
  - get
  - list
  - watch
#### Keda
- apiGroups:
  - keda.sh
  resources:
  - scaledjobs
  - scaledobjects
  - triggerauthentications
  verbs:
  - get
  - list
  - watch
{{- end }}
