{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if not .Values.rbac.singleNamespace }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ include "rbac-common.fullname" . }}:cicd
  labels:
    {{- include "rbac-common.labels" . | nindent 4 }}
rules:
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - create
  - delete
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - configmaps
  - events
  - persistentvolumeclaims
  - secrets
  - serviceaccounts
  - services
  - services/proxy
  - pods
  - pods/attach
  - pods/exec
  - pods/portforward
  - pods/proxy
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - deployments/rollback
  - deployments/scale
  - replicasets
  - replicasets/scale
  - statefulsets
  - statefulsets/scale
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - autoscaling.k8s.io
  resources:
  - verticalpodautoscalers
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
#### Cert Manager
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  - issuers
  verbs:
  - create
  - delete
  - patch
  - update
#### External Secrets
- apiGroups:
  - external-secrets.io
  resources:
  - externalsecrets
  verbs:
  - patch
  - update
  - create
  - delete
#### Victoria Metrics
- apiGroups:
  - operator.victoriametrics.com
  resources:
  - vmrules
  verbs:
  - create
  - delete
  - patch
  - update
#### Keda
- apiGroups:
  - keda.sh
  resources:
  - scaledjobs
  - scaledobjects
  verbs:
  - create
  - delete
  - patch
  - update
{{- end }}
